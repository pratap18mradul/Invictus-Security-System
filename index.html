<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#101318" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Invictus Security" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Invictus Security System - Emergency SOS</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/icons/icon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/css/styles.css" />
</head>
<body>
  <div class="phone">
    <div class="statusbar">
      <span id="clock">--:--</span>
      <div class="right">
        <span><span class="dot off" id="gpsDot"></span><span id="gpsLabel">GPS</span></span>
        <span id="battLabel">BATT --%</span>
      </div>
    </div>

    <div class="header">
      <div class="brand"><span class="mark"></span>INVICTUS SECURITY</div>
      <div class="subtitle">EMERGENCY RESPONSE SYSTEM</div>
    </div>

    <main class="content" id="content"></main>

    <nav class="navbar" aria-label="Main">
      <button data-tab="home" class="active"><span class="icon">!</span>SOS</button>
      <button data-tab="contacts"><span class="icon">+</span>CONTACTS</button>
      <button data-tab="log"><span class="icon">=</span>ACTIVITY</button>
    </nav>

    <div class="footnote">Web version opens SMS and WhatsApp with the alert filled in. Confirm send in each app.</div>
  </div>

  <script src="src/js/app.js" defer></script>
</body>
</html>
